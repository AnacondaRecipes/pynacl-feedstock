{% set name = "PyNaCl" %}
{% set version = "1.6.0" %}
{% set sha256 = "cb36deafe6e2bce3b286e5d1f3e1c246e0ccdb8808ddb4550bb2792f2df298f2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/P/PyNaCl/pynacl-1.6.0.tar.gz
  sha256: {{ sha256 }}
  patches:
    - 0001-Fix-name-of-static-sodium-lib.patch

build:
  number: 0
  skip: true  # [py<38]
  ignore_run_exports:  # [win]
    - libsodium  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - gnuconfig  # [unix]
    - m2-patch  # [win]
    - patch  # [not win]
  host:
    - python
    - cffi >=2.0.0  # [py>=314]
    - libsodium
    - msinttypes  # [win and vc<14]
    - pip
    - setuptools >=61.0.0,!=74.0.0
    - wheel
  run:
    - python
    - six
    - cffi >=2.0.0  # [py>=314]

test:
  imports:
    - nacl
    - nacl.bindings
    - nacl.pwhash
  requires:
    - pip
    - pytest >=3.2.1,!=3.3.0
    - hypothesis >=3.27.0
  source_files:
    - tests/
  commands:
    - python -m pip check || true  # [not win]
    - python -m pip check || exit 1  # [win]
    - pytest

about:
  home: https://github.com/pyca/pynacl
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: PyNaCl is a Python binding to the Networking and Cryptography library.
  description: |
    PyNaCl is a Python binding to the Networking and Cryptography library,
    a crypto library with the stated goal of improving usability, security
    and speed. It supports Python 2.7 and 3.3+ as well as PyPy 2.6+.
  doc_url: https://pynacl.readthedocs.io
  dev_url: https://github.com/pyca/pynacl

extra:
  recipe-maintainers:
    - CJ-Wright
